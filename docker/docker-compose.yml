# =============================================================================
# Banking Lakehouse - Docker Compose
# Services: MinIO, Spark (1+2), PostgreSQL, Airflow (2), Jupyter, Kafka, ZK
# =============================================================================

version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
    - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
    - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
  volumes:
    - ../airflow-dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ../spark-jobs:/opt/spark-jobs
    - ../dbt-project:/opt/dbt-project
    - ../data:/opt/data
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lakehouse-network

services:
  # ─── S3-Compatible Object Storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-network

  # ─── MinIO Bucket Initializer ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set lakehouse http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing lakehouse/bronze;
      mc mb --ignore-existing lakehouse/silver;
      mc mb --ignore-existing lakehouse/gold;
      mc mb --ignore-existing lakehouse/raw;
      echo '✅ MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - lakehouse-network

  # ─── Spark Master ─────────────────────────────────────────────────────────
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: lakehouse-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ../spark-jobs:/opt/spark-jobs
      - ../data:/opt/data
      - ../notebooks:/opt/notebooks
      - spark-warehouse:/opt/bitnami/spark/spark-warehouse
    networks:
      - lakehouse-network

  # ─── Spark Worker 1 ────────────────────────────────────────────────────────
  spark-worker-1:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: lakehouse-spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ../spark-jobs:/opt/spark-jobs
      - ../data:/opt/data
    depends_on:
      - spark-master
    networks:
      - lakehouse-network

  # ─── Spark Worker 2 ────────────────────────────────────────────────────────
  spark-worker-2:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: lakehouse-spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ../spark-jobs:/opt/spark-jobs
      - ../data:/opt/data
    depends_on:
      - spark-master
    networks:
      - lakehouse-network

  # ─── PostgreSQL (Airflow Metadata) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-network

  # ─── Airflow Webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: lakehouse-airflow-webserver
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@lakehouse.local || true &&
      airflow webserver
      "
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-webserver:
        condition: service_started

  # ─── Jupyter Lab ───────────────────────────────────────────────────────────
  jupyter:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: lakehouse-jupyter
    command: >
      bash -c "
      pip install --quiet jupyterlab &&
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
      --NotebookApp.token='' --NotebookApp.password=''
      --notebook-dir=/opt/notebooks
      "
    ports:
      - "8888:8888"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    volumes:
      - ../notebooks:/opt/notebooks
      - ../data:/opt/data
      - ../spark-jobs:/opt/spark-jobs
    depends_on:
      - spark-master
    networks:
      - lakehouse-network

  # ─── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: lakehouse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - lakehouse-network

  # ─── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: lakehouse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - lakehouse-network

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  lakehouse-network:
    driver: bridge
    name: lakehouse-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  minio-data:
    driver: local
  postgres-data:
    driver: local
  airflow-logs:
    driver: local
  spark-warehouse:
    driver: local
